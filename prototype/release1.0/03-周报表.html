<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日常记账App - 周报表</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #fafafa; --surface: #ffffff; --fg: #111111; --muted: #6b6b6b;
  --border: #e5e5e5; --border-soft: var(--border);
  --accent: #2f6feb; --accent-on: #ffffff;
  --accent-hover: color-mix(in oklab, var(--accent), black 8%);
  --accent-active: color-mix(in oklab, var(--accent), black 14%);
  --accent-soft: color-mix(in oklab, var(--accent) 12%, var(--bg));
  --success: #17a34a; --warn: #eab308; --danger: #dc2626;
  --font-display: "Inter", -apple-system, system-ui, sans-serif;
  --font-body: "Inter", -apple-system, system-ui, sans-serif;
  --font-mono: ui-monospace, "JetBrains Mono", monospace;
  --text-xs: 12px; --text-sm: 14px; --text-base: 16px; --text-lg: 20px; --text-xl: 24px; --text-2xl: 32px;
  --leading-body: 1.5; --tracking-display: -0.01em;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px;
  --space-6: 24px; --space-8: 32px;
  --radius-sm: 8px; --radius-md: 12px; --radius-pill: 9999px;
  --focus-ring: 0 0 0 3px color-mix(in oklab, var(--accent), transparent 70%);
  --motion-fast: 150ms; --ease-standard: cubic-bezier(0.2, 0, 0, 1);
  --container-gutter-desktop: 24px; --container-gutter-phone: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: var(--text-base); -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-body); font-size: var(--text-base); line-height: var(--leading-body); color: var(--fg); background: var(--bg); }
button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.gap-2 { gap: var(--space-2); }
.text-sm { font-size: var(--text-sm); }
.text-xs { font-size: var(--text-xs); }
.text-lg { font-size: var(--text-lg); }
.text-xl { font-size: var(--text-xl); }
.text-2xl { font-size: var(--text-2xl); }
.fg-muted { color: var(--muted); }
.fg-success { color: var(--success); }
.fg-danger { color: var(--danger); }
.fg-accent { color: var(--accent); }
.fw-600 { font-weight: 600; }
.fw-700 { font-weight: 700; }
.text-right { text-align: right; }
.mono { font-family: var(--font-mono); }

/* Summary Cards */
.summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: var(--space-4); padding: 0 var(--container-gutter-desktop); margin-bottom: var(--space-6); }
.summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-5); position: relative; overflow: hidden; }
.summary-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.summary-card.income-card::after { background: var(--success); }
.summary-card.expense-card::after { background: var(--danger); }
.summary-card.balance-card::after { background: var(--fg); }
.summary-card .summary-label { font-size: var(--text-xs); font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: var(--space-3); }
.summary-card .summary-value { font-size: var(--text-2xl); font-weight: 700; letter-spacing: -0.02em; }
.summary-card .summary-value.income { color: var(--success); }
.summary-card .summary-value.expense { color: var(--danger); }

/* Page */
.page-header { margin-bottom: var(--space-6); padding: 0 var(--container-gutter-desktop); }
.page-title { font-size: var(--text-2xl); font-weight: 600; letter-spacing: var(--tracking-display); }

/* Period Nav */
.report-period-nav { display: flex; align-items: center; justify-content: center; gap: var(--space-4); padding: 0 var(--container-gutter-desktop); margin-bottom: var(--space-6); }
.period-btn { padding: 6px var(--space-3); border-radius: var(--radius-sm); font-size: var(--text-sm); border: 1px solid var(--border); background: var(--surface); cursor: pointer; }
.period-btn:hover { border-color: var(--muted); }
.period-text { font-size: var(--text-base); font-weight: 500; min-width: 120px; text-align: center; }

/* Chart */
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-5); margin-bottom: var(--space-4); }
.chart-title { font-size: var(--text-sm); font-weight: 600; color: var(--fg); margin-bottom: var(--space-4); padding-bottom: var(--space-3); border-bottom: 1px solid var(--border-soft); }
.chart-container { width: 100%; height: 280px; }

/* Insight */
.insight-card { background: var(--surface); border: 1px solid var(--accent-soft); border-left: 3px solid var(--accent); border-radius: var(--radius-md); padding: var(--space-5); margin-bottom: var(--space-4); }
.insight-title { font-size: var(--text-sm); font-weight: 500; color: var(--accent); margin-bottom: var(--space-2); }
.insight-text { font-size: var(--text-sm); color: var(--fg); }

/* Compare */
.compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); padding: 0 var(--container-gutter-desktop); margin-bottom: var(--space-4); }
.compare-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: var(--space-4); text-align: center; }
.compare-label { font-size: var(--text-xs); color: var(--muted); margin-bottom: var(--space-2); }
.compare-value { font-size: var(--text-lg); font-weight: 600; font-family: var(--font-mono); }
.compare-change { font-size: var(--text-xs); margin-top: var(--space-1); }
.compare-change.up { color: var(--success); }
.compare-change.down { color: var(--danger); }

/* Responsive */
@media (max-width: 639px) {
  .summary-row { grid-template-columns: 1fr 1fr; gap: var(--space-3); padding: 0 var(--container-gutter-phone); }
  .summary-card { padding: var(--space-4); }
  .summary-value { font-size: var(--text-xl); }
  .page-header { padding: 0 var(--container-gutter-phone); }
  .compare-row { padding: 0 var(--container-gutter-phone); }
}
</style>
</head>
<body>
<div class="page-header"><div class="page-title">周报表</div></div>
<div class="report-period-nav">
  <button class="period-btn" onclick="changeWeek(-1)">◀ 上一周</button>
  <span class="period-text" id="week-period">7月13日 - 7月19日（本周）</span>
  <button class="period-btn" onclick="changeWeek(1)">下一周 ▶</button>
</div>
<div class="summary-row" style="grid-template-columns:repeat(3,1fr);">
  <div class="summary-card income-card"><div class="summary-label">本周收入</div><div class="summary-value income">¥8,500.00</div></div>
  <div class="summary-card expense-card"><div class="summary-label">本周支出</div><div class="summary-value expense">¥437.30</div></div>
  <div class="summary-card balance-card"><div class="summary-label">结余</div><div class="summary-value" style="color:var(--success);">¥8,062.70</div></div>
</div>
<div class="chart-card"><div class="chart-title">每日支出趋势</div><div class="chart-container" id="chart-weekly-trend"></div></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);padding:0 var(--container-gutter-desktop);">
  <div class="chart-card"><div class="chart-title">支出分类占比</div><div class="chart-container" id="chart-weekly-expense-pie" style="height:240px;"></div></div>
  <div class="chart-card"><div class="chart-title">收入来源分布</div><div class="chart-container" id="chart-weekly-income-pie" style="height:240px;"></div></div>
</div>
<div style="padding:0 var(--container-gutter-desktop);">
  <div class="insight-card"><div class="insight-title">📊 消费洞察</div><div class="insight-text">本周日均消费 ¥62.47，比上周减少 15.3%。住房租金占支出 64%，为主要消费类别。</div></div>
  <div class="compare-row">
    <div class="compare-card"><div class="compare-label">日均消费</div><div class="compare-value">¥62.47</div></div>
    <div class="compare-card"><div class="compare-label">环比变化</div><div class="compare-value" style="color:var(--success);">↓ 15.3%</div></div>
  </div>
</div>
<script>
function changeWeek(dir) {
  const el = document.getElementById('week-period');
  const weeks = ['7月6日-7月12日', '7月13日-7月19日（本周）', '7月20日-7月26日'];
  const idx = weeks.indexOf(el.textContent.replace(/[（）]/g, '').trim());
  const next = Math.max(0, Math.min(weeks.length-1, idx+dir));
  el.textContent = weeks[next] + (next===1 ? '（本周）' : '');
}
setTimeout(() => {
  const td = document.getElementById('chart-weekly-trend');
  if (td) { echarts.init(td).setOption({tooltip:{trigger:'axis'},grid:{left:50,right:20,top:24,bottom:30},xAxis:{type:'category',data:['周一','周二','周三','周四','周五','周六','周日'],axisLine:{lineStyle:{color:'#e5e5e5'}},axisLabel:{color:'#6b6b6b',fontSize:12}},yAxis:{type:'value',axisLine:{show:false},splitLine:{lineStyle:{color:'#f0f0f0'}},axisLabel:{color:'#6b6b6b',fontSize:11,formatter:'¥{value}'}},series:[{data:[35,186,42,28,156,98,0],type:'line',smooth:true,symbol:'circle',symbolSize:8,lineStyle:{color:'#2f6feb',width:2.5},itemStyle:{color:'#2f6feb',borderWidth:2,borderColor:'#fff'},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(47,111,235,0.15)'},{offset:1,color:'rgba(47,111,235,0.01)'}]}}}]}); }
  const pe = document.getElementById('chart-weekly-expense-pie');
  if (pe) { echarts.init(pe).setOption({tooltip:{trigger:'item'},legend:{orient:'vertical',right:10,top:'center',textStyle:{fontSize:11,color:'#6b6b6b'},itemWidth:10,itemHeight:10,itemGap:8},series:[{type:'pie',radius:['38%','65%'],center:['40%','50%'],itemStyle:{borderRadius:6,borderColor:'#fff',borderWidth:2},label:{show:false},data:[{value:2800,name:'住房租金',itemStyle:{color:'#2f6feb'}},{value:160,name:'餐饮美食',itemStyle:{color:'#dc2626'}},{value:6,name:'交通出行',itemStyle:{color:'#17a34a'}},{value:25,name:'娱乐休闲',itemStyle:{color:'#eab308'}},{value:59,name:'通讯费用',itemStyle:{color:'#8b5cf6'}}]}]}); }
  const pi = document.getElementById('chart-weekly-income-pie');
  if (pi) { echarts.init(pi).setOption({tooltip:{trigger:'item'},legend:{orient:'vertical',right:10,top:'center',textStyle:{fontSize:11,color:'#6b6b6b'},itemWidth:10,itemHeight:10,itemGap:8},series:[{type:'pie',radius:['38%','65%'],center:['40%','50%'],itemStyle:{borderRadius:6,borderColor:'#fff',borderWidth:2},label:{show:false},data:[{value:8500,name:'工资薪金',itemStyle:{color:'#17a34a'}},{value:320,name:'投资收益',itemStyle:{color:'#2f6feb'}}]}]}); }
}, 100);
</script>
</body>
</html>
